title: "[音乐投票] "
labels:
  - 音乐投票
  - 音乐投票-待确认
body:
  - type: markdown
    attributes:
      value: |
        投稿前注意
        1. 音乐投稿仅限**在网易云音乐中的歌曲**！
        2. 每个人只能最多投稿**5首**歌曲！（仅计算状态为"进行中"的投稿数量，超出限制后最新的投稿将被关闭）
        3. 音乐ID位于歌曲的地址中，如(海阔天空)[https://music.163.com/#/song?id=1357375695]（`https://music.163.com/#/song?id=1357375695`其中id后的`1357375695`就是音乐ID）

  - type: textarea
    id: music_id
    attributes:
      label: 音乐ID
      description: "投稿音乐的ID"
      placeholder: 如：1357375695
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我已阅读《投稿前注意》，确认该音乐ID有效且未在现有投票中重复提交。
          required: true
        - label: 我保证不会出现刷票等违规行为。
          required: true