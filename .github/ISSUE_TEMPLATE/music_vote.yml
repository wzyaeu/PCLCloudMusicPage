name: 添加新音乐投票投稿
description: 提交一首你喜欢的音乐参与投票（需网易云音乐内的音乐），每人限投稿3首
title: "[音乐投票]"
labels: ["音乐投票", "音乐投票-待确认"]
assignees: []
body:
  - type: markdown
  attributes:
    value: |
      投稿前注意：
      1. 每人限投**3**首歌曲
      2. 提交后千万不要再Edit提交，不然音乐ID可能会无法识别

  - type: input
    id: music_id
    attributes:
      label: 音乐 ID
      description: 提供音乐 ID（如`https://music.163.com/#/song?id=1357375695`其中的"1357375695"就是音乐 ID）
      placeholder: 例如：1357375695
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 投票确认
      options:
        - label: 我已确认该音乐链接有效，且未在现有投票中重复提交。
          required: true
        - label: 我确保不会出现各种刷票等违规行为。投票不是唯一，真爱才是证明！
          required: true
    validations:
      required: true